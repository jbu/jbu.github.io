[tools]
python = "3.14.3"
uv = "latest"
pre-commit = "latest"
prek = "latest"

[tasks.build]
run = "uv run python build.py"
description = "Build the site from Markdown sources"

[tasks.serve]
run = "python -m http.server 8000"
description = "Serve the built site locally at http://localhost:8000"

[settings]
python.uv_venv_auto = "create|source"
